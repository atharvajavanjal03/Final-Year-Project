<h2>Upload File</h2>

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <input type="file" name="file" required>
  <button type="submit">Upload</button>
</form>

<hr>

<h3>Your Files</h3>

<ul>
{% for file in files %}
  <li>
    {{ file.file }}

    <!-- Correct RAW URL -->
    <a href="{{ file.file.url }}" target="_blank">View</a>

    <a href="{{ file.file.url }}?fl_attachment" target="_blank">Download</a>

    <a href="/delete/{{ file.id }}/">Delete</a>
  </li>
{% endfor %}
</ul>

<br>
<a href="/logout/">Logout</a>
