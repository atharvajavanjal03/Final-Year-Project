<h2>Upload File</h2>
<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <input type="file" name="file">
  <button type="submit">Upload</button>
</form>

<h3>Your Files</h3>
<ul>
  {% for file in files %}
    <li>
      <a href="{{ file.file.url }}">{{ file.file.name }}</a>
      <a href="/delete/{{ file.id }}/">Delete</a>
    </li>
  {% endfor %}
</ul>

<a href="/logout/">Logout</a>
