<h2>Upload File</h2>

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <input type="file" name="file" required>
  <button type="submit">Upload</button>
</form>

<hr>

<h3>Your Files</h3>

<ul>
{% for file in files %}
  <li>
    <!-- File name -->
    {{ file.file }}

    <!-- View -->
    <a href="{{ file.file }}" target="_blank">View</a>

    <!-- Download (forced) -->
    <a href="{{ file.file }}?fl_attachment" target="_blank">Download</a>

    <!-- Delete -->
    <a href="/delete/{{ file.id }}/">Delete</a>
  </li>
{% empty %}
  <li>No files uploaded yet.</li>
{% endfor %}
</ul>

<br>
<a href="/logout/">Logout</a>
