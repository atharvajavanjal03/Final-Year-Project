<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #43cea2, #185a9d);
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #43cea2;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    a {
      display: block;
      margin-top: 10px;
      text-decoration: none;
      color: #43cea2;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Signup</h2>
  <form method="post">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Create Account</button>
  </form>
  <a href="/login/">Already have account?</a>
</div>

</body>
</html>
